<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>معرفی پزشکان | هوش‌طب</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Persian Datepicker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css" />

    <style>
        /* ===== تمام استایل‌های قبلی ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #f0f4f8;
            padding: 40px 20px;
            color: #0b1e33;
            transition: all 0.3s ease;
        }

            /* زبان فارسی */
            body.lang-fa {
                font-family: 'Vazirmatn', sans-serif;
                direction: rtl;
                text-align: right;
            }

            /* زبان انگلیسی */
            body.lang-en {
                font-family: 'Inter', sans-serif;
                direction: ltr;
                text-align: left;
            }

            /* زبان عربی */
            body.lang-ar {
                font-family: 'Cairo', sans-serif;
                direction: rtl;
                text-align: right;
            }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== Language Switcher ===== */
        .lang-switcher {
            display: flex;
            gap: 4px;
            background: #eef2f6;
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 24px;
            justify-content: center;
        }

            .lang-switcher button {
                padding: 6px 14px;
                border: none;
                border-radius: 30px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                background: transparent;
                color: #4a5b6e;
                font-family: inherit;
            }

                .lang-switcher button:hover {
                    background: rgba(37, 99, 235, 0.1);
                    color: #2563eb;
                }

                .lang-switcher button.active {
                    background: #2563eb;
                    color: white;
                    box-shadow: 0 2px 12px rgba(37, 99, 235, 0.3);
                }

                .lang-switcher button .lang-label {
                    font-size: 10px;
                    opacity: 0.7;
                    display: block;
                }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

            .page-header h1 {
                font-size: 36px;
                font-weight: 900;
                background: linear-gradient(135deg, #2563eb, #7c3aed);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 8px;
            }

            .page-header p {
                color: #4a5b6e;
                font-size: 16px;
            }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #4a5b6e;
        }

            .loading i {
                font-size: 40px;
                color: #2563eb;
                margin-bottom: 12px;
                display: block;
                animation: spin 1s linear infinite;
            }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .filter-btn {
            padding: 10px 24px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            background: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #4a5b6e;
            cursor: pointer;
            transition: all 0.3s ease;
        }

            .filter-btn:hover {
                border-color: #2563eb;
                color: #2563eb;
            }

            .filter-btn.active {
                background: linear-gradient(135deg, #2563eb, #7c3aed);
                color: white;
                border-color: transparent;
                box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
            }

        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .doctor-card {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid #eef2f6;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
        }

            .doctor-card:hover {
                transform: translateY(-6px);
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
                border-color: #dbeafe;
            }

            .doctor-card .avatar {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: linear-gradient(135deg, #dbeafe, #ede9fe);
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 16px;
                font-size: 36px;
                color: #2563eb;
            }

            .doctor-card h3 {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 4px;
            }

            .doctor-card .specialty {
                display: inline-block;
                background: #dbeafe;
                color: #1d4ed8;
                font-size: 12px;
                font-weight: 600;
                padding: 4px 16px;
                border-radius: 30px;
                margin: 6px 0 12px;
            }

            .doctor-card .info {
                font-size: 13px;
                color: #4a5b6e;
                line-height: 1.8;
            }

                .doctor-card .info i {
                    color: #2563eb;
                    width: 20px;
                    margin-left: 6px;
                }

        body.lang-en .doctor-card .info i {
            margin-left: 0;
            margin-right: 6px;
        }

        .doctor-card .working-hours {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .doctor-card .btn-booking {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 28px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 30px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

            .doctor-card .btn-booking:hover {
                transform: scale(1.04);
                box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
            }

        /* ===== دکمه کپی لینک ===== */
        .doctor-card .btn-copy-link {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            color: #4a5b6e;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .doctor-card .btn-copy-link:hover {
                background: #2563eb;
                color: white;
                transform: scale(1.1);
            }

            .doctor-card .btn-copy-link.copied {
                background: #22c55e;
                color: white;
            }

        /* ===== Toast پیام ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0b1e33;
            color: white;
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 99999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }

            .toast i {
                font-size: 18px;
            }

            .toast.success {
                background: #166534;
                border: 1px solid #86efac;
            }

            .toast.error {
                background: #991b1b;
                border: 1px solid #fca5a5;
            }

        .no-result {
            text-align: center;
            padding: 60px 20px;
            color: #4a5b6e;
            font-size: 16px;
            grid-column: 1 / -1;
        }

            .no-result i {
                font-size: 48px;
                color: #cbd5e1;
                margin-bottom: 12px;
                display: block;
            }

        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: #991b1b;
            font-size: 16px;
            background: #fee2e2;
            border-radius: 16px;
            border: 1px solid #fca5a5;
        }

            .error-message i {
                font-size: 48px;
                color: #ef4444;
                margin-bottom: 12px;
                display: block;
            }

        /* ===== Modal Styles ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

            .modal-overlay.active {
                display: flex;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px 36px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            left: 20px;
            background: #f1f5f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #4a5b6e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .modal-close:hover {
                background: #fee2e2;
                color: #991b1b;
                transform: rotate(90deg);
            }

        .modal-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eef2f6;
        }

            .modal-header .doctor-avatar {
                font-size: 48px;
                margin-bottom: 8px;
            }

            .modal-header h2 {
                font-size: 22px;
                font-weight: 800;
                color: #0b1e33;
            }

            .modal-header .doctor-specialty {
                display: inline-block;
                background: #dbeafe;
                color: #1d4ed8;
                font-size: 13px;
                font-weight: 600;
                padding: 4px 20px;
                border-radius: 30px;
                margin-top: 4px;
            }

            .modal-header .doctor-clinic {
                font-size: 14px;
                color: #4a5b6e;
                margin-top: 6px;
            }

        .modal-body .form-group {
            margin-bottom: 18px;
        }

            .modal-body .form-group label {
                display: block;
                font-size: 14px;
                font-weight: 600;
                color: #1e2b3c;
                margin-bottom: 4px;
            }

                .modal-body .form-group label .required {
                    color: #ef4444;
                }

            .modal-body .form-group input,
            .modal-body .form-group textarea {
                width: 100%;
                padding: 12px 16px;
                border: 2px solid #e2e8f0;
                border-radius: 14px;
                font-size: 14px;
                font-family: inherit;
                transition: all 0.2s ease;
                background: #fafbfc;
            }

                .modal-body .form-group input:focus,
                .modal-body .form-group textarea:focus {
                    border-color: #2563eb;
                    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
                    background: white;
                    outline: none;
                }

            .modal-body .form-group textarea {
                min-height: 100px;
                resize: vertical;
            }

            .modal-body .form-group .datepicker-wrapper {
                position: relative;
            }

                .modal-body .form-group .datepicker-wrapper input {
                    padding-left: 45px;
                    cursor: pointer;
                }

                .modal-body .form-group .datepicker-wrapper .date-icon {
                    position: absolute;
                    left: 14px;
                    top: 50%;
                    transform: translateY(-50%);
                    color: #2563eb;
                    font-size: 18px;
                    pointer-events: none;
                }

        .persian-datepicker {
            font-family: 'Vazirmatn', sans-serif !important;
            direction: rtl !important;
            z-index: 10000 !important;
        }

        .modal-body .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-body .btn-submit-modal {
            width: 100%;
            padding: 14px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

            .modal-body .btn-submit-modal:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
            }

            .modal-body .btn-submit-modal:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
            }

        .modal-body .status-msg {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            display: none;
            margin-top: 12px;
        }

            .modal-body .status-msg.success {
                display: block;
                background: #dcfce7;
                color: #166534;
                border: 1px solid #86efac;
            }

            .modal-body .status-msg.error {
                display: block;
                background: #fee2e2;
                color: #991b1b;
                border: 1px solid #fca5a5;
            }

            .modal-body .status-msg.loading {
                display: block;
                background: #e0e7ff;
                color: #3730a3;
                border: 1px solid #a5b4fc;
            }

        /* ===== لینک اختصاصی (ساده) ===== */
        .modal-link-simple {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: center;
        }

            .modal-link-simple label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                color: #4a5b6e;
                margin-bottom: 4px;
            }

            .modal-link-simple .link-text {
                font-size: 13px;
                color: #2563eb;
                direction: ltr;
                display: inline-block;
                background: white;
                padding: 2px 12px;
                border-radius: 6px;
                font-family: 'Courier New', monospace;
                user-select: all;
                word-break: break-all;
            }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .page-header h1 {
                font-size: 26px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .doctors-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 28px 18px;
            }

            .modal-body .form-row {
                grid-template-columns: 1fr;
            }

            .doctor-card .btn-copy-link {
                top: 8px;
                left: 8px;
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== LANGUAGE SWITCHER ===== -->
        <div class="lang-switcher">
            <button class="active" data-lang="fa" onclick="switchLanguage('fa')">
                فارسی
                <span class="lang-label">FA</span>
            </button>
            <button data-lang="en" onclick="switchLanguage('en')">
                English
                <span class="lang-label">EN</span>
            </button>
            <button data-lang="ar" onclick="switchLanguage('ar')">
                العربية
                <span class="lang-label">AR</span>
            </button>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="page-header">
            <h1>👨‍⚕️ <span id="pageTitle">معرفی پزشکان</span></h1>
            <p id="pageDesc">پزشکان متخصص و همکار هوش‌طب را بر اساس تخصص جستجو کنید</p>
        </div>

        <!-- ===== FILTER ===== -->
        <div class="filter-section" id="filterSection"></div>

        <!-- ===== LOADING ===== -->
        <div id="loading" class="loading">
            <i class="fas fa-spinner"></i>
            <span id="loadingText">در حال بارگذاری اطلاعات پزشکان...</span>
        </div>

        <!-- ===== DOCTORS GRID ===== -->
        <div class="doctors-grid" id="doctorsGrid" style="display:none;"></div>

    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">لینک کپی شد!</span>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>

            <div class="modal-header">
                <div class="doctor-avatar" id="modalAvatar" style="display:none">👨‍⚕️</div>
                <h2 id="modalDoctorName">دکتر علی حسینی</h2>
                <span class="doctor-specialty" id="modalSpecialty">قلب و عروق</span>
                <div class="doctor-clinic" id="modalClinic">
                    <i class="fas fa-map-marker-alt"></i> تهران، خیابان ولیعصر
                </div>
                <div class="doctor-clinic" style="font-size:12px; color:#94a3b8; margin-top:2px;" id="modalWorkingHours">
                    <i class="fas fa-clock"></i> شنبه تا چهارشنبه ۹-۱۷
                </div>
            </div>
            <div class="modal-body">
                <form id="bookingForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label><span id="labelNationalCode">کد ملی</span> <span class="required">*</span></label>
                            <input type="text" id="nationalCode" placeholder="" maxlength="10" required />
                        </div>
                        <div class="form-group">
                            <label><span id="labelFullName">نام و نام خانوادگی</span> <span class="required">*</span></label>
                            <input type="text" id="fullName" placeholder="" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label><span id="labelVisitDate">تاریخ ویزیت</span> <span class="required">*</span></label>
                        <div class="datepicker-wrapper">
                            <input type="text" id="visitDate" placeholder="" required autocomplete="off" />
                            <span class="date-icon"><i class="fas fa-calendar-alt"></i></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><span id="labelMobile">شماره موبایل</span> <span class="required">*</span></label>
                        <input type="tel" id="mobile" placeholder="" maxlength="11" required />
                    </div>

                    <div class="form-group">
                        <label><span id="labelDescription">شرح حال و علائم</span> <span class="required">*</span></label>
                        <textarea id="description" placeholder="لطفاً علائم، سابقه بیماری، داروهای مصرفی و هر نکته مهم را شرح دهید..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit-modal" id="submitBookingBtn">
                        <i class="fas fa-paper-plane"></i> <span id="btnSubmit">ثبت پذیرش هوشمند</span>
                    </button>
                    <div id="bookingStatus" class="status-msg"></div>
                </form>
            </div>
            <!-- ===== لینک اختصاصی ===== -->
            <div class="modal-link-simple">
                <label><i class="fas fa-link"></i> <span id="modalLinkLabel">لینک اختصاصی ثبت شرح حال</span></label>
                <span class="link-text" id="doctorLinkDisplay">https://hooshteb.ir/doctors.html?doctor=1</span>
            </div>

        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/persian-date@1.1.0/dist/persian-date.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>

    <script>
        // ============================================================
        //  دریافت زبان
        // ============================================================
        function getLanguage() {
            // 1. ابتدا از localStorage
            var savedLang = localStorage.getItem('hooshteb_lang');

            // 2. اگر در localStorage بود
            if (savedLang && ['fa', 'en', 'ar'].includes(savedLang)) {
                return savedLang;
            }

            // 3. از URL
            var urlParams = new URLSearchParams(window.location.search);
            var urlLang = urlParams.get('lang');
            if (urlLang && ['fa', 'en', 'ar'].includes(urlLang)) {
                localStorage.setItem('hooshteb_lang', urlLang);
                return urlLang;
            }

            // 4. پیش‌فرض فارسی
            return 'fa';
        }

        // ============================================================
        //  متغیر زبان
        // ============================================================
        var currentLang = getLanguage();

        // ============================================================
        //  دیکشنری چند زبانه
        // ============================================================
        var translations = {
            fa: {
                // ===== متون اصلی =====
                pageTitle: 'معرفی پزشکان',
                pageDesc: 'پزشکان متخصص و همکار هوش‌طب را بر اساس تخصص جستجو کنید',
                loadingText: 'در حال بارگذاری اطلاعات پزشکان...',
                modalLinkLabel: 'لینک اختصاصی ثبت شرح حال',

                // ===== برچسب‌های فرم =====
                labelNationalCode: 'کد ملی',
                labelFullName: 'نام و نام خانوادگی',
                labelVisitDate: 'تاریخ ویزیت',
                labelMobile: 'شماره موبایل',
                labelDescription: 'شرح حال و علائم',

        // ============================================================
        //  تابع تغییر زبان
        // ============================================================
        function switchLanguage(lang) {
            currentLang = lang;

            // ذخیره در localStorage
            localStorage.setItem('hooshteb_lang', lang);

            // تغییر کلاس body
            document.body.className = 'lang-' + lang;

            // تغییر جهت صفحه
            if (lang === 'en') {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
            } else {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = lang;
            }

            // به‌روزرسانی دکمه‌های زبان
            document.querySelectorAll('.lang-switcher button').forEach(function (btn) {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                }
            });

            // به‌روزرسانی متون صفحه
            var t = translations[lang];
            if (t) {
                // ===== متون اصلی =====
                document.getElementById('pageTitle').textContent = t.pageTitle;
                document.getElementById('pageDesc').textContent = t.pageDesc;
                document.getElementById('loadingText').textContent = t.loadingText;
                document.getElementById('modalLinkLabel').textContent = t.modalLinkLabel;

                // ===== برچسب‌های فرم =====
                document.getElementById('labelNationalCode').textContent = t.labelNationalCode;
                document.getElementById('labelFullName').textContent = t.labelFullName;
                document.getElementById('labelVisitDate').textContent = t.labelVisitDate;
                document.getElementById('labelMobile').textContent = t.labelMobile;
                document.getElementById('labelDescription').textContent = t.labelDescription;

                // ===== دکمه‌ها =====
                document.getElementById('btnSubmit').textContent = t.btnSubmit;

                // ===== Placeholder های فرم =====
                document.getElementById('nationalCode').placeholder = t.nationalCodePlaceholder || 'کد ملی را وارد کنید';
                document.getElementById('fullName').placeholder = t.fullNamePlaceholder || 'نام و نام خانوادگی را وارد کنید';
                document.getElementById('visitDate').placeholder = t.visitDatePlaceholder || 'تاریخ ویزیت را وارد کنید';
                document.getElementById('mobile').placeholder = t.mobilePlaceholder || 'شماره موبایل را وارد کنید';
                document.getElementById('description').placeholder = t.descriptionPlaceholder || 'لطفاً علائم، سابقه بیماری، داروهای مصرفی و هر نکته مهم را شرح دهید...';
            }

            // به‌روزرسانی دکمه‌های فیلتر
            document.querySelectorAll('.filter-btn').forEach(function (btn) {
                if (btn.dataset.filter === 'all') {
                    btn.textContent = t.allFilter;
                }
            });

            // بازسازی لیست پزشکان
            renderDoctors(currentFilter);

        // ============================================================
        //  آدرس Google Apps Script
        // ============================================================
        var SCRIPT_URL = 'https://hooshteb-api.ghfreza.workers.dev/api/doctors'

        //  متغیرها
        // ============================================================
        let doctors = [];
        let currentFilter = 'all';
        let selectedDoctor = null;

        // ============================================================
        //  تبدیل فونت اعداد فارسی به انگلیسی
        // ============================================================
        function toEnglishDigits(value) {
            if (value == null) return "";
            return value
                .toString()
                .replace(/[۰-۹]/g, function (d) {
                    return "0123456789"["۰۱۲۳۴۵۶۷۸۹".indexOf(d)];
                })
                .replace(/[٠-٩]/g, function (d) {
                    return "0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)];
                });
        }

        // ============================================================
        //  تولید UUID ساده
        // ============================================================
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0;
                var v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ============================================================
        //  دریافت پارامتر از URL
        // ============================================================
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // ============================================================
        //  نمایش Toast
        // ============================================================
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            var toastMessage = document.getElementById('toastMessage');

            toast.className = 'toast ' + (type || 'success');
            toastMessage.textContent = message;

            setTimeout(function () {
                toast.classList.add('show');
            }, 100);

            setTimeout(function () {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        //  کپی کردن لینک
        // ============================================================
        function copyDoctorLink(doctorId, btnElement) {
            var url = window.location.href.split('?')[0] + '?doctor=' + doctorId;
            var t = translations[currentLang];

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function () {
                    btnElement.classList.add('copied');
                    btnElement.innerHTML = '<i class="fas fa-check"></i>';
                    btnElement.title = t.toastCopy || 'کپی شد!';
                    showToast(t.toastCopy || '✅ لینک کپی شد!', 'success');
                    setTimeout(function () {
                        btnElement.classList.remove('copied');
                        btnElement.innerHTML = '<i class="fas fa-link"></i>';
                        btnElement.title = t.copyLinkTitle || 'کپی لینک';
                    }, 2000);
                }).catch(function () {
                    fallbackCopy(url, btnElement);
                });
            } else {
                fallbackCopy(url, btnElement);
            }
        }

        function fallbackCopy(text, btnElement) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            var t = translations[currentLang];
            try {
                document.execCommand('copy');
                btnElement.classList.add('copied');
                btnElement.innerHTML = '<i class="fas fa-check"></i>';
                showToast(t.toastCopy || '✅ لینک کپی شد!', 'success');
                setTimeout(function () {
                    btnElement.classList.remove('copied');
                    btnElement.innerHTML = '<i class="fas fa-link"></i>';
                }, 2000);
            } catch (err) {
                showToast(t.error_copy_link || '❌ خطا در کپی کردن لینک', 'error');
            }
            document.body.removeChild(textarea);
        }

        // ============================================================
        //  پر کردن لینک در مودال
        // ============================================================
        function fillDoctorLink(doctorId) {
            var linkDisplay = document.getElementById('doctorLinkDisplay');
            if (linkDisplay) {
                var url = window.location.href.split('?')[0] + '?doctor=' + doctorId;
                linkDisplay.textContent = url;
            }
        }

        // ============================================================
        //  بررسی وجود پارامتر doctor در URL
        // ============================================================
        function checkDoctorInUrl() {
            var doctorId = getUrlParameter('doctor');
            if (doctorId) {
                setTimeout(function () {
                    var doctor = doctors.find(d => d.id == doctorId);
                    if (doctor) {
                        openModal(doctorId);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        console.log('پزشک با ID ' + doctorId + ' یافت نشد');
                    }
                }, 800);
            }
        }

        // ============================================================
        //  بارگذاری اطلاعات از فایل JSON
        // ============================================================
        async function loadDoctors() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('doctorsGrid');
            var t = translations[currentLang];

            try {
                const response = await fetch('data/doctors.json');

                if (!response.ok) {
                    throw new Error(t.error_on_loading || `خطا در بارگذاری: ${response.status}`);
                }

                const data = await response.json();

                if (!data.doctors || data.doctors.length === 0) {
                    throw new Error(t.error_on_pezeshk_finding || 'هیچ پزشکی یافت نشد');
                }

                doctors = data.doctors;

                loading.style.display = 'none';
                grid.style.display = 'grid';

                buildFilters();
                renderDoctors('all');

                // تنظیم زبان اولیه
                switchLanguage(currentLang);

                checkDoctorInUrl();

            } catch (error) {
                console.error('خطا:', error);
                loading.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-circle"></i>
                                <span>${error_on_loading_data}: ${error.message}</span>
                                <br><br>
                                <button onclick="location.reload()" style="padding:10px 24px;background:#2563eb;color:white;border:none;border-radius:30px;cursor:pointer;font-family:inherit;">
                                    <i class="fas fa-redo"></i>${warning_try_again}
                                </button>
                            </div>
                        `;
            }
        }

        // ============================================================
        //  ساخت دکمه‌های فیلتر
        // ============================================================
        function buildFilters() {
            const filterSection = document.getElementById('filterSection');
            var t = translations[currentLang];

            const specialties = [...new Set(doctors.map(d => d.specialty))];

            const allBtn = document.createElement('button');
            allBtn.className = 'filter-btn active';
            allBtn.dataset.filter = 'all';
            allBtn.textContent = t.allFilter || 'همه';
            allBtn.addEventListener('click', function () {
                setActiveFilter(this);
                renderDoctors('all');
            });
            filterSection.appendChild(allBtn);

            specialties.forEach(spec => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = spec;
                btn.textContent = spec;
                btn.addEventListener('click', function () {
                    setActiveFilter(this);
                    renderDoctors(spec);
                });
                filterSection.appendChild(btn);
            });
        }

        // ============================================================
        //  فعال‌سازی دکمه فیلتر
        // ============================================================
        function setActiveFilter(activeBtn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
            currentFilter = activeBtn.dataset.filter;
        }

        // ============================================================
        //  نمایش پزشکان
        // ============================================================
        function renderDoctors(filter) {
            const grid = document.getElementById('doctorsGrid');
            var t = translations[currentLang];

            const filtered = filter === 'all' ?
                doctors :
                doctors.filter(d => d.specialty === filter);

            if (filtered.length === 0) {
                grid.innerHTML = `
                            <div class="no-result">
                                <i class="fas fa-user-slash"></i>
                                <span>${t.noResult.replace('{filter}', filter)}</span>
                            </div>
                        `;
                return;
            }

            grid.innerHTML = filtered.map(d => `
                        <div class="doctor-card">
                            <button class="btn-copy-link" onclick="copyDoctorLink('${d.id}', this)" title="${t.copyLinkTitle || 'کپی لینک'}">
                                <i class="fas fa-link"></i>
                            </button>
                            <div class="avatar">${d.avatar || '👨‍⚕️'}</div>
                            <h3>${d.name}</h3>
                            <span class="specialty">${d.specialty}</span>
                            <div class="info">
                                <div style="display:none"><i class="fas fa-phone"></i> ${d.phone || 'نامشخص'}</div>
                                <div><i class="fas fa-map-marker-alt"></i> ${d.clinic || 'نامشخص'}</div>
                                <div style="font-size:12px; color:#94a3b8; margin-top:4px;">${d.about || ''}</div>
                                ${d.working_hours ? `<div class="working-hours"><i class="fas fa-clock"></i> ${d.working_hours}</div>` : ''}
                            </div>
                            <button class="btn-booking" onclick="openModal('${d.id}')">
                                <i class="fas fa-calendar-check"></i> ${t.bookingBtn || 'پذیرش هوشمند'}
                            </button>
                        </div>
                    `).join('');
        }

        // ============================================================
        //  باز کردن مودال
        // ============================================================
        function openModal(doctorId) {
            selectedDoctor = doctors.find(d => d.id == doctorId);
            if (!selectedDoctor) return;

            document.getElementById('modalAvatar').textContent = selectedDoctor.avatar || '👨‍⚕️';
            document.getElementById('modalDoctorName').textContent = selectedDoctor.name;
            document.getElementById('modalSpecialty').textContent = selectedDoctor.specialty;
            document.getElementById('modalClinic').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${selectedDoctor.clinic || 'نامشخص'}`;
            document.getElementById('modalWorkingHours').innerHTML = `<i class="fas fa-clock"></i> ${selectedDoctor.working_hours || 'نامشخص'}`;

            // پر کردن لینک
            fillDoctorLink(doctorId);

            document.getElementById('bookingModal').classList.add('active');
            document.body.style.overflow = 'hidden';

            setTimeout(function () {

                    });

                }

        // ============================================================
        //  بستن مودال
        // ============================================================
        function closeModal() {
            document.getElementById('bookingModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('bookingForm').reset();
            document.getElementById('bookingStatus').className = 'status-msg';

            try {
                if ($('#visitDate').data('persianDatepicker')) {
                    $('#visitDate').data('persianDatepicker').destroy();
                }
            } catch (e) { }
        }

        // ============================================================
        //  بستن مودال با کلیک روی پس‌زمینه
        // ============================================================
        document.getElementById('bookingModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ============================================================
        //  اعتبارسنجی کد ملی
        // ============================================================
        function validateNationalCode(code) {
            if (!/^\d{10}$/.test(code)) return false;
            const check = parseInt(code[9]);
            let sum = 0;
            for (let i = 0; i < 9; i++) {
                sum += parseInt(code[i]) * (10 - i);
            }
            const remainder = sum % 11;
            if (remainder < 2) return check === remainder;
            return check === (11 - remainder);
        }

        // ============================================================
        //  نمایش وضعیت در مودال
        // ============================================================
        function setModalStatus(message, type) {
            const statusEl = document.getElementById('bookingStatus');
            statusEl.className = 'status-msg ' + type;
            statusEl.textContent = message;
            if (type !== 'loading') {
                setTimeout(function () {
                    statusEl.className = 'status-msg';
                }, 8000);
            }
        }

        // ============================================================
        //  ارسال فرم پذیرش هوشمند به Google Sheets
        // ============================================================
        document.getElementById('bookingForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const nationalCode = toEnglishDigits(document.getElementById('nationalCode').value.trim());
            const fullName = document.getElementById('fullName').value.trim();
            const visitDate = toEnglishDigits(document.getElementById('visitDate').value.trim());
            const mobile = toEnglishDigits(document.getElementById('mobile').value.trim());
            const description = toEnglishDigits(document.getElementById('description').value.trim());
            var t = translations[currentLang];

            if (!nationalCode || !fullName || !visitDate || !mobile || !description) {
                setModalStatus(t.warning_fill_all_fields || 'لطفاً تمام فیلدهای ضروری را پر کنید.', 'error');
                return;
            }

            if (!validateNationalCode(nationalCode)) {
                setModalStatus(t.warning_fill_nationalid_validity || 'کد ملی وارد شده معتبر نیست.', 'error');
                return;
            }

            if (!/^09\d{9}$/.test(mobile)) {
                setModalStatus(t.warning_fill_mobile_validity || 'شماره موبایل باید با ۰۹ شروع و ۱۱ رقم باشد.', 'error');
                return;
            }

            if (!selectedDoctor?.phone) {
                setModalStatus(t.warning_select_pezeshk || 'لطفاً پزشک را انتخاب کنید.', 'error');
                return;
            }

            const data = {
                UUID: generateUUID(),
                NationalCode: toEnglishDigits(nationalCode),
                FullName: fullName,
                MobileNum: toEnglishDigits(mobile),
                VisitDate: toEnglishDigits(visitDate),
                VisitAsdk: description,
                DoctorMobile: toEnglishDigits(selectedDoctor.phone),
                DoctorName: selectedDoctor.name
            };

            const btn = document.getElementById('submitBookingBtn');
            btn.disabled = true;
            btn.innerHTML = t.confirm_on_posting || "در حال ثبت...";
            setModalStatus(t.confirm_on_posting_data || 'در حال ثبت اطلاعات...', 'loading');

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams(data)
                });

                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }

                const result = await response.json();

                if (result.result === "success") {
                    setModalStatus(t.confirm_posted_data_success || "✅ اطلاعات شما با موفقیت ثبت شد. منتظر پیامک تأييد هوش طب باشید", "success");
                    this.reset();
                    setTimeout(() => {
                        closeModal();
                    }, 2500);
                } else {
                    setModalStatus("❌ " + (result.message || "ثبت اطلاعات انجام نشد."), "error");
                }

            } catch (err) {
                console.error(err);
                setModalStatus(t.error_on_connect_to_server +"\n" || "❌ خطا در ارتباط با سرور\n" + err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "ثبت اطلاعات";
            }
        });

        // ============================================================
        //  محدودیت ورودی
        // ============================================================
        document.getElementById('nationalCode').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });

        document.getElementById('mobile').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 11);
        });

        // ============================================================
        //  بارگذاری اولیه
        // ============================================================
        document.addEventListener('DOMContentLoaded', loadDoctors);
    </script>

</body>
</html>
