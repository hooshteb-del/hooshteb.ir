<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>هوش‌طب - پذیرش پزشکی هوشمند</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
        /* تمام استایل‌های قبلی به همین شکل باقی می‌مونن */
        /* ... (همون استایل‌هایی که دادی) ... */
    </style>
</head>
<body>
    <!-- تمام HTML به همین شکل باقی می‌مونه -->
    <!-- ... -->

    <script>
        (function() {
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXuLF5yHJXxKC_wQrToKpYTIaeWMzyHMJiBpKd25paSRMsyi3WMjD5AynYNPztwobC/exec';
            
            const form = document.getElementById('appointmentForm');
            const statusMsg = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            const submitBtn = document.getElementById('submitBtn');

            function setStatus(message, type = 'loading') {
                statusMsg.className = 'status-message ' + type;
                statusText.textContent = message;
                if (type !== 'loading') {
                    clearTimeout(window.statusTimeout);
                    window.statusTimeout = setTimeout(() => {
                        statusMsg.className = 'status-message';
                    }, 6000);
                }
            }

            function validateNationalCode(code) {
                if (!/^\d{10}$/.test(code)) return false;
                const check = parseInt(code[9]);
                let sum = 0;
                for (let i = 0; i < 9; i++) {
                    sum += parseInt(code[i]) * (10 - i);
                }
                const remainder = sum % 11;
                if (remainder < 2) return check === remainder;
                return check === (11 - remainder);
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                // گرفتن مقادیر
                const nationalCode = document.getElementById('nationalCode').value.trim();
                const fullName = document.getElementById('fullName').value.trim();
                const mobile = document.getElementById('mobile').value.trim();
                const doctorName = document.getElementById('doctorName').value.trim();
                const visitDate = document.getElementById('visitDate').value;
                const gender = document.getElementById('gender').value;
                const description = document.getElementById('description').value.trim();
                const visitType = document.querySelector('input[name="visitType"]:checked');

                // اعتبارسنجی
                if (!nationalCode || !fullName || !mobile || !doctorName || !visitDate || !description || !visitType) {
                    setStatus('لطفاً تمام فیلدهای ضروری (ستاره‌دار) را پر کنید.', 'error');
                    return;
                }

                if (!validateNationalCode(nationalCode)) {
                    setStatus('کد ملی وارد شده معتبر نیست (۱۰ رقم).', 'error');
                    return;
                }

                if (!/^09\d{9}$/.test(mobile)) {
                    setStatus('شماره موبایل باید با ۰۹ شروع و ۱۱ رقم باشد.', 'error');
                    return;
                }

                // ساخت داده
                const data = {
                    nationalCode,
                    fullName,
                    mobile,
                    doctorName,
                    visitDate,
                    gender: gender || 'نامشخص',
                    description,
                    visitType: visitType.value,
                    timestamp: new Date().toLocaleString('fa-IR', { timeZone: 'Asia/Tehran' })
                };

                setStatus('در حال ثبت اطلاعات...', 'loading');
                submitBtn.disabled = true;

                try {
                    // استفاده از URLSearchParams برای ارسال داده
                    const formData = new URLSearchParams();
                    Object.keys(data).forEach(key => {
                        formData.append(key, data[key]);
                    });

                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: formData.toString()
                    });

                    const result = await response.json();
                    console.log('پاسخ از سرور:', result);

                    if (result.result === "success") {
                        setStatus('✅ اطلاعات با موفقیت ثبت شد!', 'success');
                        form.reset();
                        document.querySelectorAll('input[name="visitType"]').forEach(r => r.checked = false);
                    } else {
                        setStatus('❌ ' + (result.error || 'خطای ناشناخته'), 'error');
                    }

                } catch (error) {
                    console.error('خطا:', error);
                    setStatus('❌ خطا در ارتباط با سرور: ' + error.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                }
            });

            // تنظیم تاریخ پیش‌فرض
            (function setDefaultDate() {
                const dateInput = document.getElementById('visitDate');
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const year = tomorrow.getFullYear();
                const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
                const day = String(tomorrow.getDate()).padStart(2, '0');
                dateInput.value = `${year}-${month}-${day}`;
            })();

            // محدودیت ورودی
            document.getElementById('nationalCode').addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 10);
            });
            document.getElementById('mobile').addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 11);
            });

        })();
    </script>

</body>
</html>
